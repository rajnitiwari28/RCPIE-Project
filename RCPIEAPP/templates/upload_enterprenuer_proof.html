{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center">Upload Entrepreneur Documents</h2>

    <!-- ================= NEW ENTREPRENEUR ================= -->
    <form method="POST" enctype="multipart/form-data" class="p-4 border rounded shadow mb-4">
        {% csrf_token %}

        <h4>New Entrepreneur Submission</h4>

        <div class="mb-3">
            <label class="form-label">Entrepreneur Title</label>
            {{ form.enterprenuer_title }}
        </div>

        <div class="mb-3">
            <label class="form-label">Upload Main Document (PDF)</label>
            {{ form.proof_pdf_1 }}
        </div>

        <button type="submit" class="btn btn-primary">Submit New</button>
    </form>


    <!-- ================= UPDATE ENTREPRENEUR ================= -->
    <form method="POST" enctype="multipart/form-data" class="p-4 border rounded shadow">
        {% csrf_token %}

        <h4>Update Existing Entrepreneur (Upload Final Proof)</h4>

        <div class="mb-3">
            <label class="form-label">Select Entrepreneur</label>
            <select name="entrepreneur_id" class="form-control">
                <option value="">Select Entrepreneur</option>
                {% for e in entrepreneurs %}
                    <option value="{{ e.id }}">
                        {{ e.enterprenuer_title }}
                    </option>
                {% empty %}
                    <option>No records found</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Upload Additional Proof</label>
            <input type="file" name="proof_file" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Update Proof</button>
    </form>
</div>
{% endblock %}
