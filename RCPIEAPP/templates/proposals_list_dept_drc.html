<table>
    <thead>
        <tr>
            <th>Select</th>
            <th>Title</th>
            <th>Faculty</th>
            <th>Status</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody>
        {% for proposal in proposals %}
        <tr>
            <td><input type="checkbox" class="proposal_checkbox" value="{{ proposal.id }}"></td>
            <td>{{ proposal.title }}</td>
            <td>{{ proposal.faculty.get_full_name }}</td>
            <td>{{ proposal.status }}</td>
            <td><button class="view_details" data-id="{{ proposal.id }}">View</button></td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
    $(document).ready(function() {
        $('.view_details').click(function() {
            var proposalId = $(this).data('id');
            $.ajax({
                url: '{% url "show_data" %}', // Ensure this URL is configured to load proposal details
                type: 'GET',
                data: {'proposal_id': proposalId},
                success: function(response) {
                    $('#showdata').html(response);
                },
                error: function(xhr) {
                    alert('Error loading proposal details!');
                }
            });
        });
    });
</script>
